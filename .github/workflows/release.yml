name: Release go-tecton

on:
  push:
    tags:
      - "v*"
permissions:
  contents: write

jobs:
  build-and-release:
    name: Build and Release Binaries
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - goos: windows
            goarch: amd64
            ext: .exe
          - goos: linux
            goarch: amd64
            ext: ""
          - goos: darwin
            goarch: amd64 # Mac Intel
            ext: ""
          - goos: darwin
            goarch: arm64 # Mac Apple Silicon (M1/M2/M3)
            ext: ""

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: ⚙️ Setup Go Environment
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: 🔨 Build Binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p build
          go build -ldflags="-s -w" -o build/tecton-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }} cmd/tecton/main.go

      - name: 🚀 Upload to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          files: build/tecton-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}
          generate_release_notes: true
